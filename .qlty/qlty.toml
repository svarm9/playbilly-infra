config_version = "0"

exclude_patterns = [
  "*_min.*",
  "*-min.*",
  "*.min.*",
  # CDK synth output (bundled Lambda + deps) — build artifact, like dist/.
  # Excluded so trivy/checkov don't walk thousands of vendored files.
  "**/cdk.out/**",
  "**/.yarn/**",
  "**/*.d.ts",
  "**/assets/**",
  "**/bower_components/**",
  "**/build/**",
  "**/cache/**",
  "**/config/**",
  "**/db/**",
  "**/deps/**",
  "**/dist/**",
  "**/extern/**",
  "**/external/**",
  "**/generated/**",
  "**/Godeps/**",
  "**/gradlew/**",
  "**/mvnw/**",
  "**/node_modules/**",
  "**/protos/**",
  "**/seed/**",
  "**/target/**",
  "**/templates/**",
  "**/testdata/**",
  "**/vendor/**",
]

test_patterns = [
  "**/test/**",
  "**/spec/**",
  "**/*.test.*",
  "**/*.spec.*",
  "**/*_test.*",
  "**/*_spec.*",
  "**/test_*.*",
  "**/spec_*.*",
]

[smells]
mode = "comment"

[[source]]
name = "default"
default = true


# PB-31: quality/security/IaC plugins for the CDK (TypeScript) infra. Duplication
# via [smells] above (advisory). prettier + trivy (deps/IaC) + checkov (IaC
# misconfig) + semgrep + gitleaks + trufflehog.
#
# NOTE: eslint is not enabled — this repo ships no eslint/prettier config today,
# and introducing a full lint stack is out of scope for Qlty adoption. Qlty's
# prettier gives formatting; `yarn build` (tsc) remains the type gate.
[[plugin]]
name = "prettier"

[[plugin]]
name = "semgrep"

[[plugin]]
name = "gitleaks"

[[plugin]]
name = "trufflehog"

# trivy + checkov download vulnerability/policy DBs and are slow, so they are
# CI-only: `triggers` omits pre-commit/pre-push, keeping them out of the git
# hooks. They still run in CI (the advisory `qlty` job runs `qlty check`, the
# `manual` trigger). The pre-push hook then runs only the fast plugins
# (semgrep, gitleaks, trufflehog).
[[plugin]]
name = "trivy"
triggers = ["manual", "build", "agent"]

[[plugin]]
name = "checkov"
triggers = ["manual", "build", "agent"]
